jpa.default.properties.hibernate.hbm2ddl.auto = 'none'
jpa.default.properties.hibernate.globally_quoted_identifiers = true

[micronaut.environment]
AES_SECRET = "minhaChaveSecreta123456"

[micronaut.test.resources]
enabled = true

[test-resources]
enabled = true

[datasources.default]
url = 'jdbc:mysql://localhost:3306/CONECTA_DB'
username = 'root'
password = 'root'
driver-class-name = 'com.mysql.cj.jdbc.Driver'
dialect = 'MYSQL'

[redis]
uri = 'redis://root@localhost:6379'

[redis.pool]
enabled = true
max-idle = 8
min-idle = 1
max-active = 16
max-wait = '-1ms'

[micronaut.server.ssl]
enabled = true
build-self-signed = true

[micronaut]
application.name = 'backend'


[acme]
enabled = false

[micronaut.security]
enabled = true
authentication = 'bearer'
token.jwt.signatures.secret.generator.secret = '${JWT_GENERATOR_SIGNATURE_SECRET:pleaseChangeThisSecretForANewOne}'
reject-if-no-rule = false
reject-not-found = false
ip-patterns = []

[[micronaut.security.intercept-url-map]]
pattern = "/auth/**"
access = ["isAnonymous()"]

[[micronaut.security.intercept-url-map]]
pattern = "/swagger/**"
access = ["isAnonymous()"]

[[micronaut.security.intercept-url-map]]
pattern = "/swagger-ui/**"
access = ["isAnonymous()"]

[micronaut.router.static-resources.swagger]
paths = ["classpath:META-INF/swagger"]
mapping = '/swagger/**'

[micronaut.router.static-resources.swagger-ui]
paths = 'classpath:META-INF/swagger/views/swagger-ui'
mapping = '/swagger-ui/**'

[micronaut.server.cors]
enabled = true

[[micronaut.server.cors.allowedOrigins]]
pattern = "http://localhost:8443"

[micronaut.server.cors.allowedMethods]
access = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]

[micronaut.server.cors.allowedHeaders]
access = ["Content-Type", "Authorization", "Cookie"]

[micronaut.server.cors.allowCredentials]
enabled = true